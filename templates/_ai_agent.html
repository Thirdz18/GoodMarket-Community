<div id="gm-ai-agent" class="gm-ai-agent" data-ai-agent>
  <button class="gm-ai-toggle" type="button" aria-expanded="false" aria-controls="gm-ai-panel">
    <span>✨</span>
    <strong>GoodMarket Agent</strong>
  </button>
  <section id="gm-ai-panel" class="gm-ai-panel" aria-label="GoodMarket Agent" hidden>
    <header class="gm-ai-header">
      <div>
        <strong>GoodMarket Agent</strong>
        <small>Prepares actions only — you still confirm and sign.</small>
      </div>
      <button type="button" class="gm-ai-close" aria-label="Close GoodMarket Agent">×</button>
    </header>
    <div class="gm-ai-messages" role="log" aria-live="polite">
      <div class="gm-ai-msg gm-ai-msg-bot">Hi! Try “send 10 G$ to 0x…”, “load 09123456789 20”, or “check balance”.</div>
    </div>
    <form class="gm-ai-form">
      <input class="gm-ai-input" name="message" type="text" autocomplete="off" placeholder="Ask GoodMarket Agent…" />
      <button type="submit">Send</button>
    </form>
  </section>
</div>
<link rel="stylesheet" href="{{ url_for('static', filename='js/ai-agent.css', v=ASSET_VERSION) }}">
<script src="{{ url_for('static', filename='js/ai-agent.js', v=ASSET_VERSION) }}" defer></script>
