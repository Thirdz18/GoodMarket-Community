<div id="gm-ai-agent" class="gm-ai-agent" data-ai-agent>
  <button class="gm-ai-toggle" type="button" aria-expanded="false" aria-controls="gm-ai-panel">
    <span>✨</span>
    <strong>GoodMarket Agent</strong>
  </button>
  <section id="gm-ai-panel" class="gm-ai-panel" aria-label="GoodMarket Agent" hidden>
    <header class="gm-ai-header">
      <div>
        <strong>GoodMarket Agent</strong>
        <small>Prepares actions only — you still confirm and sign.</small>
      </div>
      <button type="button" class="gm-ai-close" aria-label="Close GoodMarket Agent">×</button>
    </header>
    <div class="gm-ai-messages" role="log" aria-live="polite">
      <div class="gm-ai-msg gm-ai-msg-bot">
        <div>Hi! Tap a command below or type your own message. Username at wallet address, parehong pwede for send/stream.</div>
        <div class="gm-ai-command-grid" aria-label="GoodMarket Agent command examples">
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is GoodMarket?">What is GoodMarket?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is GoodDollar?">What is GoodDollar?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is GoodMarket Savings?">What is GoodMarket Savings?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is P2P trading?">What is P2P trading?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is G$ stream?">What is G$ stream?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="What is Play & Earn?">What is Play & Earn?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="Who is developer?">Who is developer?</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="How to Send Tokens">How to Send Tokens</button>
        <button type="button" class="gm-ai-command" data-gm-ai-command="Check Balance">Check Balance</button>
        </div>
        <div class="gm-ai-manual-example">Tip: tap “How to Send Tokens” to see examples for G$, cUSD, and USDT transfers.</div>
      </div>
    </div>
    <form class="gm-ai-form">
      <input class="gm-ai-input" name="message" type="text" autocomplete="off" placeholder="Ask GoodMarket Agent…" />
      <button type="submit">Send</button>
    </form>
  </section>
</div>
<link rel="stylesheet" href="{{ url_for('static', filename='js/ai-agent.css', v=ASSET_VERSION) }}">
<script src="{{ url_for('static', filename='js/ai-agent.js', v=ASSET_VERSION) }}" defer></script>
