<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — GoodMarket</title>
    <meta name="theme-color" content="#7c3aed">
    <link rel="icon" type="image/png" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B0F2A 0%, #130D35 50%, #1A103D 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .card {
            max-width: 420px;
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(12px);
        }
        .logo {
            width: 88px;
            height: 88px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
        }
        .logo img { width: 100%; height: 100%; display: block; }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { color: #cbd5e1; margin-bottom: 20px; line-height: 1.5; font-size: 0.95rem; }
        button {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
            color: white;
            border: 0;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
        }
        button:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><img src="/static/icons/icon-192x192.png" alt="GoodMarket"></div>
        <h1>You're offline</h1>
        <p>GoodMarket needs a connection to load this page. Check your internet and try again — your saved session will still be here.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
